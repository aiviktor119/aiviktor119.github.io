<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aiviktor119 | Creative Developer Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1) translate(0px, 0px); opacity: 0.4; }
            33% { transform: scale(1.1) translate(30px, -50px); opacity: 0.6; }
            66% { transform: scale(0.95) translate(-20px, 20px); opacity: 0.4; }
        }
        @keyframes pulse-reverse {
            0%, 100% { transform: scale(1) translate(0px, 0px); opacity: 0.3; }
            50% { transform: scale(1.15) translate(-40px, 40px); opacity: 0.5; }
        }
        .animate-blob-1 {
            animation: pulse-slow 12s infinite ease-in-out;
        }
        .animate-blob-2 {
            animation: pulse-reverse 16s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-100 font-sans flex flex-col min-h-screen overflow-hidden relative selection:bg-indigo-500/30">

    <!-- Интерактивный размытый фон (Неоновые сферы) -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <!-- Левая фиолетовая сфера -->
        <div class="absolute top-1/4 -left-20 w-96 h-96 bg-indigo-600 rounded-full blur-[120px] animate-blob-1"></div>
        <!-- Правая бирюзовая сфера -->
        <div class="absolute bottom-1/4 -right-20 w-[450px] h-[450px] bg-emerald-600 rounded-full blur-[150px] animate-blob-2"></div>
    </div>

    <!-- Тонкая пиксельная сетка для технологичного вида -->
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff03_1px,transparent_1px),linear-gradient(to_bottom,#ffffff03_1px,transparent_1px)] bg-[size:32px_32px] pointer-events-none z-10"></div>

    <!-- Контент -->
    <main class="flex-grow flex flex-col items-center justify-center text-center px-6 relative z-20">
        
        <!-- Лейбл-индикатор -->
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-indigo-500/30 bg-indigo-500/10 text-indigo-400 text-xs font-semibold uppercase tracking-widest mb-8 animate-pulse">
            <span class="w-2 h-2 rounded-full bg-indigo-400"></span>
            Under Construction
        </div>

        <!-- Главный заголовок -->
        <h1 class="text-5xl md:text-7xl font-black tracking-tight mb-6 bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-gray-500">
            Coming Soon
        </h1>

        <!-- Подзаголовок -->
        <p class="text-gray-400 text-lg md:text-xl max-w-lg mb-10 leading-relaxed">
            Мы строим что-то действительно крутое. Совсем скоро здесь появится единая платформа для наших приложений и инструментов.
        </p>

        <!-- Анимированный декоративный элемент загрузки -->
        <div class="w-64 h-1 bg-gray-800 rounded-full overflow-hidden relative">
            <div class="absolute top-0 left-0 bottom-0 bg-gradient-to-r from-indigo-500 to-emerald-500 w-1/3 rounded-full animate-[loading_2s_infinite_ease-in-out]"></div>
        </div>
        
        <!-- CSS-анимация для полосы загрузки -->
        <style>
            @keyframes loading {
                0% { left: -33%; width: 33%; }
                50% { width: 50%; }
                100% { left: 100%; width: 33%; }
            }
        </style>
    </main>

    <!-- Лаконичный подвал -->
    <footer class="border-t border-white/5 py-6 text-center text-xs text-gray-500 relative z-20">
        <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <p>&copy; 2026 aiviktor119. All rights reserved.</p>
            <div class="flex gap-6">
                <a href="app-ads.txt" class="hover:text-indigo-400 transition-colors">app-ads.txt</a>
                <span class="text-white/10">|</span>
                <span class="text-gray-600">Built with Passion</span>
            </div>
        </div>
    </footer>

</body>
</html>
